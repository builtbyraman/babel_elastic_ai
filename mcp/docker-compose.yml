version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    env_file: .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - RESULT_BACKEND=${RESULT_BACKEND}
      - MCP_API_BACKEND=${MCP_API_BACKEND}
      - DATABASE_URL=${DATABASE_URL}
      # Secrets encryption — generate with:
      # python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
      - SECRETS_KEY=${SECRETS_KEY}
      # Bootstrap: creates a seed tenant + API key on first startup (idempotent)
      - BOOTSTRAP_TENANT=${BOOTSTRAP_TENANT:-default}
      - BOOTSTRAP_EMAIL=${BOOTSTRAP_EMAIL:-}
      - BOOTSTRAP_API_KEY=${BOOTSTRAP_API_KEY:-}
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    env_file: .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - RESULT_BACKEND=${RESULT_BACKEND}
      - MCP_API_BACKEND=${MCP_API_BACKEND}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
